name: SLSA generic generator
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.upload.outputs.artifact-path }}
    steps:
      - uses: actions/checkout@v4

      # Step 1: 构建你的 artifacts
      - name: Build artifacts
        run: |
            mkdir -p artifacts
            echo "artifact1" > artifacts/artifact1.txt
            echo "artifact2" > artifacts/artifact2.txt

      # Step 2: 上传 artifacts，供 SLSA 引用
      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: built-artifacts
          path: ./artifacts/
          if-no-files-found: error

  # Step 3: 调用 SLSA 生成器，为 artifacts 生成 provenance
  provenance:
    needs: [build]
    permissions:
      actions: read   # 读取 workflow 路径
      id-token: write # 签名 provenance
      contents: write # 将 provenance 添加到 release
    # 关键：必须定义如下所示的 generator job
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      # ⚠️ 这里只传递路径，不传递 base64 编码的内容
      compile-generator: true
    secrets:
      # ⚠️ 这里不使用 github-token，v2 会自动处理权限

  # Step 4: 【修复私有仓库】显式定义一个 generator job
  generator:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      id-token: write
      contents: write
    # ✅ 修复私有仓库问题的核心：设置环境变量
    environment:
      name: slsa-generator
      url: https://github.com/${{ github.repository }}
    env:
      # 强制 SLSA 生成器在私有仓库上运行
      SLSA_GENERATOR_ALLOW_PRIVATE_REPOSITORY: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v1
        with:
          egress-policy: audit
      # 调用 SLSA generator，指定需要签名的 artifacts 路径
      - uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
        with:
          # 指定需要签名的 artifacts（支持通配符）
          subject-path: './artifacts/artifact*.txt'
