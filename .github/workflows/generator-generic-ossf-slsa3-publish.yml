# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow lets you generate SLSA provenance file for your project.
# The generation satisfies level 3 for the provenance requirements - see https://slsa.dev/spec/v0.1/requirements
# The project is an initiative of the OpenSSF (openssf.org) and is developed at
# https://github.com/slsa-framework/slsa-github-generator.
# The provenance file can be verified using https://github.com/slsa-framework/slsa-verifier.
# For more information about SLSA and how it improves the supply-chain, visit slsa.dev.

name: SLSA generic generator
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.upload.outputs.artifact-path }}

    steps:
      - uses: actions/checkout@v4

      # ========================================================
      # Step 1: Build your artifacts.
      # ========================================================
      - name: Build artifacts
        run: |
            mkdir -p artifacts
            echo "artifact1" > artifacts/artifact1.txt
            echo "artifact2" > artifacts/artifact2.txt
            echo "✅ Built artifacts in ./artifacts/"

      # ========================================================
      # Step 2: Upload artifacts as a single zip (required by SLSA v2)
      # ========================================================
      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: built-artifacts
          path: ./artifacts/
          if-no-files-found: error

  provenance:
    needs: [build]
    permissions:
      actions: read   # To read the workflow path.
      id-token: write # To sign the provenance.
      contents: write # To add assets to a release.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      # ⚠️ v2 使用 subject-path 而不是 base64-subjects
      subject-path: './artifacts/artifact*.txt'
      # ✅ 显式声明这是一个私有仓库
      private-repository: true
      # ✅ 上传到 release (如果是 release 触发)
      upload-assets: true
    secrets:
      # 如果上传到 release 需要 token
      github-token: ${{ secrets.GITHUB_TOKEN }}
